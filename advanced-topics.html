  <script>
    const groups = [{"title": "牌与牌义技巧", "sections": [{"title": "“母性”展现的方式不同", "access": "一对一 / 团课选讲", "items": ["在塔罗牌中，母亲能量最强的两张牌，除了三号女王之外就是星币女王。权杖女王虽然也算是母亲的角色，但是她们母性的能量也是不同的。", "具体需要根据牌性，元素去判断不同之处在哪里。", "比如我在将宝剑和权杖骑士的时候用这两个人物角色作为对比，女王和星币女王也可以这样作为对比。她们元素相同，有些地方相似，但是在母亲这个角色上的表达方式是完全不同的。", "女王是更舒展的角色，她拥有的资源更多，她能够给予的也更多。她是国母的角色，权力和地位要更高，包容心也更强。", "她在家庭和两性关系中处于非常强势的位置，处于一个引导者的位置，从这一点上就是和星币女王完全不同的。", "她的付出更多是：我想付出", "星币女王和女王对比下来，她的角色更多像是一种大家族中的主母角色。没有非常强大的权力，所做的一切都是为了家族。", "类比于小说中主母的功能，一举一动代表家族的名声和脸面，没有像女王一样有非常强烈的母神的能量，自然也没有特别舒展，所有的事情都是围绕家庭。", "她的付出是：我该付出", "权杖女王:家庭中非常强势的代表，有压迫力的代表。权杖女王会对孩子有比较高的要求并且执行力高，盯着孩子学习。太过于强势的缺点反而会暴露得更加明显", "圣杯女王：相对来说不适合当母亲的角色，本身情绪不稳定，对孩子保护欲过强，属于孩子不小心摔了一跤都能哭的类型，过于敏感担忧，只要孩子咳嗽就要喂药。但是优点是共情强，能和孩子相处愉快。", "宝剑女王：是会拿其他孩子和自己家孩子比较的类型。但是实际上对孩子情绪关注少，事业心更强的妈妈，要求也高。会给孩子报各种辅导班，让ta承受比较大的不符合年龄的压力的类型", "星币女王：非常负责的母亲，会给孩子力所能及的好的生活条件和关爱，让孩子成长在快乐的童年中。保护欲不会过强，属于奉献性的母亲角色。缺点是把感情过度投入到孩子上，夫妻关系成了第二或者第三位"]}, {"title": "色调的作用", "access": "一对一 / 团课选讲", "items": ["在韦特和一些比较精美的泛韦特，甚至一些马赛中，色调也是一个非常具有参考意义的方向。", "比如，所有黄色的背景都是积极的能量，都是温和向上的能量。甚至宝剑7这种牌，也是更多倾向这种投机取巧的“成功”", "大部分的黑色背景都是代表了一种业力，部分牌，比如宝剑9，黑色背景就强调了一种无法缓解的痛苦能量。", "蓝色的背景更加压抑，能直观地感受出这件事情或者当下的状态非常吃力，难以推进，甚至发展悲观。"]}, {"title": "权杖骑士和宝剑骑士的冲突对比", "access": "一对一 / 团课选讲", "items": ["宝剑骑士：速度快，爆发高，言语辱骂和暴力手段都有，但伤害性更强，有见血风险。骂人气势足，且无底线，对应到老赖这种成分，脸皮厚，会威胁，本身情绪控制能力差且好斗。", "比如：生气的时候嗓门大，有侮辱性，会动手", "权杖骑士：冲动占据上风，有言语辱骂和暴力手段，但是基本不会到见血的程度，多数为冲动情况下的一时情绪上头。本身对情绪控制能力相对一般，但是不会像宝剑骑士那样。", "冲动的时候攻击性比宝剑骑士稍弱。", "比如：生气的时候脸涨红，会摔东西"]}, {"title": "宝剑八，宝剑九和宝剑十的痛苦区别", "access": "一对一 / 团课选讲", "items": ["宝剑八的痛苦：更多是自己给自己设限，自己带来的痛苦。是能够摆脱能够挣脱的束缚。", "宝剑九的痛苦：因为发生的事情影响了自己的思维，想的太多太过于焦虑而产生的痛苦。甚至是受到了严重的情感伤害之后对于未来的担忧。", "宝剑十的痛苦：已经死透了的状态，结束的状态。确实能够结束，但是过程不尽人意。宝剑十的痛苦到这里的时候是已经结束了的，接下来就会迎来新的开始了。"]}, {"title": "三、四元素速查表", "access": "一对一 / 团课选讲", "items": ["元素", "激情、冲突、性、快速、争吵", "直觉、流动、眼泪、敏感、不稳定", "逻辑、理性、伤害、尖锐、言语", "现实、稳定、产业、看得见摸得着"]}, {"title": "四、落实解读：元素组合逻辑", "access": "一对一 / 团课选讲", "items": ["这是从\"懂元素\"走向\"会解牌\"的关键一步。以感情/人际为例。", "1. 互补组合（圣杯 + 其他元素）", "组合", "喜欢，且有行动力、有热情", "喜欢，且有计划、有目标", "喜欢，有基础、有经济能力、现实条件支持", "2. 重复元素（能量失衡）", "火 + 火 + 水", "只有喜欢和行动力，毫无计划，缺现实/经济支撑", "水 + 水 + 风", "只有想法，但水多了不稳定，反而不利计划发展", "注意：具体仍要看抽到的牌", "比如宝剑 9 和宝剑 1 的\"计划程度\"完全不同。", "3. 元素过多的负面", "水过多：情绪/感情不稳定。", "土过多：感情被现实拖累，因分摊经济成本斤斤计较，不知变通，对感情助推力弱。", "缺土：可能现实条件不支持（父母、异地、经济），也可能感情基础不足（认识太短、了解不深）。"]}, {"title": "六、小结", "access": "一对一 / 团课选讲", "items": ["四元素不是要背的知识点，而是一套底层语言：", "火给你行动、水给你感受、风给你思考、土给你现实。", "读懂它们之间的流动与失衡，你解的就不再是一张张孤立的牌，而是一个完整的人和处境。"]}]}, {"title": "客户与咨询现场", "sections": [{"title": "客户问询手册", "access": "老师自用", "items": ["在初期定价的时候不要把价格放太低，后期涨价客户损失会更重。60是一个分水岭，技术成熟之后80和120也是分水岭。", "占卜是和顾客的双向选择，如果和这个人觉得不合，在不缺钱的情况下可以不用接。", "红包没办法看清金额，如果对方发的是红包立即收下确认。如果是转账，解答完确认。"]}, {"title": "客户咨询", "access": "老师自用", "items": ["一定要确认具体问题，不能模糊。问桃花的时候要和客户说明桃花=有感情摩擦的人，不一定能在一起。问长久发展建议对方去找八字或者星盘。如果客户不知道怎么问，让他把大概情况说一下你来负责问题。"]}, {"title": "客户态度", "access": "老师自用", "items": ["问完价格删除是常见的，说明他们不是你的服务对象。在问询期间如果有没有礼貌的客户也完全不用客气，本质上是平等的交易模式。在抽出的牌和客户告知的结果不同时先检测自己状态如何，抽牌时心不在焉的话可以重新抽。"]}, {"title": "客户砍价", "access": "老师自用", "items": ["砍价的客户需要根据你当下的价格来，如果你价格高的话可以每周适当抽一天让利，或者拉新客抵扣，但是千万不要主动降价"]}, {"title": "02.常见解读策略", "access": "老师自用", "items": ["1.抽出的牌和客户口述不同。", "所有的客户在描述当前信息的时候都是带有主观性的。如果你在抽牌的时候确认自己状态无误，优先相信自己的牌。", "2.对不上情况", "立刻检查一下自己解牌思路是不是存在问题，看看有没有遗漏的地方，然后根据客户的补充信息重新解答。", "3.客户隐瞒情况", "一般出现在第一种情况。这种客户如果过往没有刻意隐瞒的情况的话可以不用多考虑，出现两次以上不建议接待，对占卜师都不诚实那ta描述的事情主观性一定会非常强，可信度不高。", "4.客户感到占卜结果不够准确或“模糊”", "这也是为什么问问题的时候就不能模糊的原因。另外，在解答一开始就要把ta的答案点出来。", "5.牌面特别差", "该说实话一定要说，但是不能给出死答案，要留有空间，并且委婉。", "比如：事业能力不行没办法找到工作", "目前资质不太够，经验或者专业之类和对方预期有差。", "感情对方完全厌恶", "对方逃避心态很重，目前不想和你有交流，而且觉得你联系太频繁，先歇歇吧，让对方缓缓再来看。", "03.不同情况下的解读策略", "亲密关系", "共情的同时注重中立性，不能帮客户吐槽对方，不可以站边，强调关系中需要进步的地方，处理敏感点，比如性和第三者一定要谨慎。", "涉及第三方的类型", "明确界限，占卜应该聚焦提问者自身，避免过度揣测第三方（牌反应的是能量和可能性）。如果客户一定要看，需要告知他准确率会受影响，让他自己做选择。", "事业学业类型", "侧重务实分析，看事业学业的不像对感情那样接受度低，但是涉及到显示对方能力不足时可以委婉指出“工作经验履历”等类似方面。", "个人成长类型", "更多聚焦在卦主内心状态，回答需要更侧重启发性。重点除了分析当下之外要根据牌面给出调整方向。", "其他：持续骚扰：一般来说是非常焦虑的情况，适当推荐牌阵以及安抚。遇到需要花钱的时候就不会继续骚扰了。", "言语攻击的情况下直接收钱告诉他你现在状态不好，冷静一点再说。如果还是继续攻击直接拉黑", "对结果/状态有异议：在你保证你状态良好的情况下，一是你解读出错，二是这个客户主观性太强，这个时候先回溯一下自己是不是方向错了，如果没有话那你就没错。告诉他牌面是这样的，不行重新给他抽。如果已经解读完了告诉你不对，解释完直接收钱，除了牌的问题别的不用回答。", "连续追问：预先说好补牌还是追问的话就加钱，没钱了说求求你就看一张的直接拒绝。这种就是白嫖一次就占到便宜的心态，不会成为老客户。", "觉得不值：告诉他三张牌对塔罗师来说是一个整体，解读不仅包含牌义，还包含了我根据您的具体情况进行的分析、整合和建议，这需要专业经验和时间投入。然后单张拆解给他再讲一遍。嫌麻烦直接用AI.", "撒谎：面对客户隐瞒信息或描述带有主观性的情况，应保持客观，根据牌面解读并适时回溯。对于隐瞒信息的客户，可以询问是否有未提及的信息或直接拒绝服务。", "有牌拿出给你看：要么是自己抽的或者别人抽的，拿出来让你解，告诉他每个人抽牌风格不同，解读仅基于牌面本身，不保证深度或适用性。收钱，一定收钱。", "理智型客户：其实占比不小，这种情况多注重现实因素，因为他们要的是肯定答案，可以给出大概几率。", "追星和梦占：如果不是真的没钱了，别接。", "状态极差：安抚为主，劝他去医院。健康方面也是，给你做参考不是给你看病，不舒服去医院。", "准确率：很多顾客爱问这种问题。塔罗不是绝对预测，是根据当下状态提供的未来趋势。准确率不能完全保证，能达到60%就已经是很厉害了（写道德经的老子准确率也就才70，没人能做到百分百）。说自己准确率99%的基本上都是偏外行人的。", "流程上，需先确认具体问题，避免模糊提问，", "比如：我们感情会变好吗？（什么是好？你对好的定义是什么？）", "我工作发展好吗？（好是什么？升职还是稳定？）", "ta对我什么感觉啊？（情感方面还是友情？）", "面对喜欢谈心的客户，将话题引回牌面内容，掌握沟通节奏，及时结束服务。", "特殊情况：涉及到政治和外网相关的问题，警惕一点，根据具体情况决定要不要看。而且必须让顾客说清楚前因后果。", "一对一和团课共享：", "宫廷牌年龄对应", "侍从牌的年龄在12-18岁左右，非常年轻的能量，也会对应到十八岁以下的儿童。特别是问怀孕生子的情况下。", "骑士对应的年龄在18-25岁左右，相对来说比侍从要更加成熟，但是仍然缺少长期负责的能力（主要看元素）。", "女王的年龄在26-40岁，在宫廷牌是定位比较特殊的位置，是最成熟的阴性能量的体现。", "国王牌的年龄在30-35+， 最成熟，也最有能力负责，经济能力也是最好的。", "宫廷牌代表的只是象征的年龄，而并非真实年龄", "偶尔情况下可以对应上当下这个人的实际年纪，但是在更多情况下，他代表的是心态，或者状态。", "比如感情卦中，男性30岁，对待感情的想法出了侍从牌，那就更倾向他对这段感情的态度偏向18岁左右的能量。", "四元素的底层逻辑：", "非常重要的一环，西方神秘学完全依靠四元素构成。", "四元素本质"]}, {"title": "五、解读心法", "access": "一对一 / 团课选讲", "items": ["在感情和人际中，没有完全正面、也没有完全负面的牌。", "人的性格与感情复杂多面，塔罗只是捕捉了当下对方最重的那一份感受。和客户解读时，一定不能把话说死。", "结合牌性举例：", "圣杯二：平等交流、快乐相处；但负面是这种热情不会长久，要提醒客户除了眼前，也做长远考虑。", "圣杯五：过于忧虑失去或没有的东西，却忽略了自己的优势。", "圣杯骑士：不代表\"白马王子\"，但确实是相处下来人品不错的人。", "要结合牌性判断客户需要的是断舍离（圣杯八）还是安全感（圣杯六）。"]}]}, {"title": "占星基础", "sections": [{"title": "占星中行星基础认知", "access": "一对一 / 团课选讲", "items": ["在占星学中，行星象征着不同的能量和特质。每颗行星都与塔罗牌中的不同牌和元素相关联，占星学为塔罗的理解提供了另一层面的象征性和深度", "占星学通过天体的位置和运动，分析这些天体如何影响个人的性格、情感、行为和命运。最常用的占星图是个人星盘，它基于出生时间、日期和地点，展示了当时太阳、月亮、行星和其他天体的位置。", "白羊座：3.21-4.20，火星掌管。", "金牛座：4.20-5.21，金星掌管。", "双子座：5.22-6.21，水星掌管。", "巨蟹座：6.22-7.22，月亮掌管。", "狮子座：7.23-8.22，太阳掌管。", "处女座：8.24-9.23，水星掌管。", "天秤座：9.24-10.33，金星掌管。", "天蝎座：10.23-11.22，火星掌管。", "射手座：11.23-12.21，木星掌管。", "魔羯座：12.22-1.20，土星掌管。", "水瓶座：1.21-2.19，天王星掌管。", "双鱼座：2.20-3.20，海王星掌管。", "太阳（SUN-APPOLO）太阳系的中心。代表尊严，父亲，白天，阳性，领导能力，权力欲，目标，生命力，意志，君主，高官，丈夫，组织管理.", "月亮（MOON-ARTEMIS）", "母亲，情绪，养育，记忆，反应，安全感，依赖感，梦想，心境，夜晚，妻子。", "金星（VENUS-APHRODITE）", "爱情，感官享受，娱乐，金钱观，情妇，年轻女性，情感生活，美丽，价值，艺术，音乐，审美，合作，和谐，给予.", "火星（MARS-ARES）", "冲动，执行力，破坏性，爆发力，脾气，竞争，好斗，行动，鲁莽，热情，力量，情夫，武断", "水星（Mercury-HERMES）", "智力，口才，商业，旅行，沟通，变化无常，偷窃，信息交换，信使，通讯，学习，观点写作.", "木星和土星（JUPITER-ZEUS/SATURN-CRONUS）", "木星：扩展，扩大，慷慨，保护，成功，财富，仁慈，权利，法律。", "土星：限制，悲观，拘谨，恐惧，压抑，怀疑，压抑，控制，责任。", "三王星", "天王星：特立独行，发明，革新，直觉，意外打击，自由，非传统。", "海王星：吸毒，梦幻，迷茫，通灵，混乱，欺骗，毁灭，宿命论。", "冥王星：破坏，变态，毁灭，暴乱，战祸，新生，复活，巫术，先驱，秘密"]}]}, {"title": "卡巴拉与对应体系", "sections": [{"title": "什么是卡巴拉生命之树", "access": "一对一 / 团课选讲", "items": ["卡巴拉起源于犹太教的神秘学传统，最早在12世纪的西班牙和南法地区开始显现。卡巴拉生命之树是犹太神秘学的重要象征，后来的各种神秘学和灵性体系（如西方神秘学、塔罗牌等）都受到了卡巴拉的影响。", "卡巴拉生命之树由10个赛斐罗和22条路径组成，赛斐罗代表神圣的属性或力量，而路径则是连接这些属性的通道。赛斐罗按其象征意义，可以分为三大“柱子”或区域", "左柱（严厉与智慧）", "右柱（仁慈与美）", "中柱（灵性平衡）", "每个赛斐罗代表一种宇宙力量或原则，并与特定的行星和能量相关联。以下是每个赛斐罗的基本含义和对应的行星", "生命之树的路径连接了不同的赛斐罗，每条路径象征着灵性进化中的某一步。通过这些路径的探索，个体可以从更低的能量层次向更高的层次进化，实现精神的升华", "卡巴拉生命之树的路径是连接10个赛斐罗（神圣的属性）的桥梁，它们的作用是指引灵性成长和觉醒。每条路径都有其特定的象征意义，代表着灵魂的历程、灵性提升的过程。", "路径的意义：每一条路径可以看作是通向下一个更高层次的灵性进化的通道。它们代表着不同的成长、试炼和体验。例如，从感知到理解，从知识到智慧，从情感的调整到神性的体验，等等", "路径与赛斐罗之间的关系：路径是连接赛斐罗的桥梁，每个路径都有它自己的象征含义和精神任务。通常，我们根据路径两端的赛斐罗来理解它的具体含义。例如，如果路径连接了“赫塞德”（仁慈）和“吉博拉”（力量），这条路径就与平衡和调和仁慈与力量之间的能量流动有关。", "路径的能量：每条路径的能量反映了不同的灵性状态或成长过程。这些路径不仅是理论上的连接线，也代表着实际的灵性体验，比如自我觉察、面对内在的挑战或成长的机遇。", "每条路径可以被视为灵性修炼的“试炼场”。通过这些路径，修行者可以获得启示或面对生活中的挑战。", "比如，某条路径连接的是“赫塞德”和“提弗雷斯”，它可能象征着一个人的情感历程，如何通过慈爱与和谐的力量来平衡自己内心的美与和谐。", "愚人：对应 Kether（王冠）到 Chokmah（智慧），这一条路径连接了精神上的最初点，象征着无限的潜力和开始的无知状态。", "魔术师：对应 Chokmah（智慧）到 Binah（理解），这条路径代表着从纯粹的潜能到理性理解的转化。", "女祭司：对应 Binah（理解）到 Tiphareth（美丽），连接理性与心灵的对话，代表直觉和智慧的平衡。", "皇后：对应 Binah（理解）到 Netzach（胜利），这条路径是从理解到行动的转化，代表创造和物质化。", "皇帝：对应 Chokmah（智慧）到 Hod（荣耀），象征权威、结构和管理。", "教皇：对应 Tiphareth（美丽）到 Chesed（仁爱），代表传统的教义和精神上的指引。", "恋人：对应 Chesed（仁爱）到 Geburah（严厉），这条路径代表了选择和爱的对立面，象征着决策。", "战车：对应 Geburah（严厉）到 Netzach（胜利），代表决心和意志的力量。", "力量：对应 Tiphareth（美丽）到 Geburah（严厉），象征内在的力量和自我控制。", "隐士：对应 Tiphareth（美丽）到 Yesod（基础），代表内心的追寻和智慧的指引。", "命运之轮：对应 Yesod（基础）到 Hod（荣耀），象征变化、周期和命运的转折。", "正义：对应 Tiphareth（美丽）到 Hod（荣耀），代表平衡、判断和真理。", "倒吊人：对应 Netzach（胜利）到 Yesod（基础），象征着牺牲、顿悟和从另一个角度看问题。", "死神：对应 Yesod（基础）到 Malkuth（王国），代表结束、转变和重生。", "节制：对应 Netzach（胜利）到 Malkuth（王国），象征着平衡、调和和内外的和谐。", "恶魔：对应 Hod（荣耀）到 Malkuth（王国），代表物质的束缚和内在的困境。", "高塔：对应 Hod（荣耀）到 Geburah（严厉），象征着灾难、崩塌和彻底的改变。", "星星：对应 Tiphareth（美丽）到 Chesed（仁爱），代表希望、疗愈和精神的复兴。", "月亮：对应 Chesed（仁爱）到 Netzach（胜利），象征幻象、潜意识和情感的波动。", "太阳：对应 Netzach（胜利）到 Tiphareth（美丽），象征着清晰、启示和阳光的力量。", "审判：对应 Malkuth（王国）到 Kether（王冠），代表升华、觉醒和最终的转变。", "世界：对应 Chokmah（智慧）到 Malkuth（王国），代表完成、圆满和宇宙的统一"]}, {"title": "四重天在卡巴拉生命之树中的划分", "access": "一对一 / 团课选讲", "items": ["四重天的划分是根据赛斐罗和它们所处的能量层次来进行的，每个“天”对应的是生命之树中的某个区域，并且这些区域体现了从神性到物质的逐渐下降。", "1. 阿齐尔（Atziluth）", "神性世界", "起始点：位于生命之树的顶端，主要包括**凯瑟尔（Kether）**赛斐罗。", "范围：这个区域主要包含生命之树中的最上方部分，代表最纯粹的神性能量，象征源头、神性意图和无形的创世能量。", "能量特征：无形、纯粹、神圣的力量，没有物质化的表现。这个层次是灵性和神性的初始源头，是所有其他层次的根基。", "2. 布里亚（Briah）", "思想世界", "起始点：从凯瑟尔（Kether）赛斐罗向下延伸，主要包括霍赫玛（Chokhmah）和比纳（Binah）赛斐罗。", "范围：这个区域涉及到思想的生成和智慧的展现，是神圣创意的体现。布里亚的能量开始具象化，具有思想、智慧和创意的特质，虽然还未物质化。", "能量特征：抽象的思维和理念的层次，代表创造和理念的世界，开始有了思想的产生，思想和意图在这个领域逐渐形成具体的计划", "3. 耶茨拉（Yetzirah）", "情感世界", "起始点：从赫塞德（Chesed）到马尔库特（Malkuth）赛斐罗的部分，这个层次包含了赫塞德（Chesed）、吉博拉（Gevurah）、提弗雷斯（Tiferet）、内策赫（Netzach）、**霍德（Hod）和耶索德（Yesod）**赛斐罗。", "范围：耶茨拉代表了情感、心理和心灵的层面，是从理性思想到感性体验的过渡阶段。它包括了所有的感情、情绪、心理和心灵活动，能量在这个阶段变得更为具象化。", "能量特征：这是从思想到情感的转化层次，灵魂的情感面、心理面、意识层面的显现。它是创造的情感动能，充满了内心体验、心灵感知和感情的纠葛。", "4. 阿西亚（Assiah）", "物质世界", "起始点：**马尔库特（Malkuth）**赛斐罗。", "范围：这个层次是最终的物质显现，它代表了物理世界和具体的现实，体现了所有灵性能量最终的物质化和具象化。", "能量特征：最具具体性和物质性，它是所有灵性和情感力量的最终显现，是物质世界和我们的日常生活体验。这个层次是灵性降临的地方，意味着灵魂通过物质世界的表现来进行体验和发展。"]}, {"title": "小牌的对应", "access": "一对一 / 团课选讲", "items": ["1. 数字 = 生命之树的赛菲罗特", "Kether（王冠，起点", "Chokmah（智慧，阳性动力）", "Binah（理解，阴性孕育）", "Chesed（仁慈，秩序）", "Geburah（严厉，挑战）", "Tiphareth（美，平衡）", "Netzach（胜利，情感与欲望）", "Hod（荣光，思想与表达）", "Yesod（基石，潜意识）", "Malkuth（王国，显化结果）", "2. 花色 = 卡巴拉的四界（能量层次）", "权杖 Wands = Atziluth（火界，灵感/意志）", "圣杯 Cups = Briah（水界，情感/灵魂）", "宝剑 Swords = Yetzirah（风界，思想/理智）", "星币 Pentacles = Assiah（土界，物质/行动）", "小牌 = 数字 + 花色", "赛菲罗特 + 四界"]}]}, {"title": "特殊判断与老师自用", "sections": [{"title": "寻物具体情况", "access": "一对一 / 团课选讲", "items": ["普通寻物品的问题主要抽牌的时候需要特别关注牌面的画面，这个时候牌意是完全无用的。", "画面为主，元素为辅。对思维散发的能力要求很高。寻物一般会比较少，但是也是会有人来问。", "在你不确定是不是能找到或者经验不足的情况下可以适当少收一些钱。", "活物是最麻烦的。一般都是宠物而不是财物，这种东西是会一直移动的，环境就很难定位。", "所以在找活物的时候一定要先和客户说好“不能保证会找到，只能看看当下大概环境以及是否安全”", "经典韦特和泛韦特之间的观察会有区别，但是主要还是从画面入手。", "比如，元素太多说明环境杂乱", "有桌子可能是在这附近或者书房等", "权杖牌和宝剑牌多的时候一定要拓展思维，不一定是物品，有可能是物品上的装饰", "寻物的时候直接抽三张牌定环境就可以"]}, {"title": "附加：经典韦特中有同性恋倾向的牌", "access": "老师自用 / 谨慎讲解", "items": ["女祭司：女同", "恋人：双性恋", "正义：双性恋", "恶魔：弯但是骗别人是直", "星星：水仙", "月亮：女同更多，但是也是有隐瞒", "审判：少见，但是同性恋问原因的话，审判属于生下来就这样", "世界：4i，双性恋"]}, {"title": "长相", "access": "老师自用 / 课堂选讲", "items": ["强化元素概念：", "外放、张扬，精力充沛但容易粗犷。", "温柔、流畅，五官柔和，富有情感表达。", "瘦削、锐利，带有思考者的气息。", "稳重、踏实，五官端正且朴实。", "好看的：骑士", "侍从只能说不算丑。", "然后看元素：风水，比火土好看。 火的长相属于那种长得土，看上去没什么文化的，类似小混混的那种。 土的长相类似于佟丽娅，漂亮但是精致土，比较接地气的那种长相。", "宫廷牌也可以看年龄，比如国王比骑士看上去老一点，9号牌也会显老。", "愚人：清澈的愚蠢 。", "魔术师 ：杨洋那种，好看的鸡贼", "女祭司 ：高领之花看上去比较难相处 ，如果出了三张阴性牌的话可能是同性恋", "女皇 ：有些胖，或者微胖，圆润丰满型的身材，长相比较甜 。相对来说其实没有什么攻击性的那种长相", "皇帝 ：方头明那种，比较油的 。", "教皇 ：看上去就是那种体制内的比较油腻的那种男生 。", "恋人 ：长相不错但是比较容易出gay", "战车 ：长的漂亮但话不是很多", "力量 ：很典型的体育生身材很好", "隐士：长相会有一些显老属于一般的那种长相有些社恐", "命运之轮 ：完全属于开盲盒", "正义 ：好看", "倒吊人：不算丑但是看上去状态不是很好 ，比较容易营养不良的那种感觉，有黑眼圈 ，但是底子很好", "死神 ：不丑 ，甚至是性格或者某一方面是比较有吸引力的", "节制：脱发和谢顶的概率会比较大，到35岁之后变秃顶的概率为90%", "恶魔 ：长得不丑而且舍得给自己的脸花钱", "高塔 ：有点像花期很短的外国人，长得只能说好看过", "星星 ：更多的是气质方面的 五官大部分比较漂亮", "月亮 ：容易出照骗 妆前和妆后是两个人", "太阳 ：非常板正的那种帅，比如说陆毅", "审判 ：一般 没有太好看的", "世界 ：比较好看。属于很有野性的自由生长的美", "星币九 ，星币一 女皇，所有侍从，宝剑和圣杯骑士般不会太丑", "权杖侍从和骑士，权杖六大概率是好看的"]}, {"title": "小阿尔卡纳对应", "access": "一对一 / 团课选讲", "items": ["火元素", "权杖（Wands）", "维度", "行动力、创造力，能量的直接输出", "激情、热情、冲突、争吵、快速、性", "火象星座的能量，外放而直接。", "对应到身体层面，火元素关联性器官；在涉及性生活、性能力的议题时，火元素的表现力大多数时候最佳（极个别除外）。", "圣杯（Cups）", "情感、情绪、感受、直觉", "敏感、流动、眼泪、不稳定、包容、温柔", "圣杯几乎所有牌表达的都是一种内在感受。无论感情、人际还是经济问题，都要优先考虑对方的内在状态与感受。", "水的流动性极强，意味着情绪与感情的不稳定性也强：它不像火有行动力、不像风有计划性，而是包容温柔的元素。解牌时要把这种不稳定性纳入考量。", "水能载舟亦能覆舟：情感方向上水流动过多，反而是不稳定的象征，需结合牌性与画面意象判断正负面。", "宝剑（Swords）", "思想、思维、逻辑、理性", "冬天（寒冷的能量）", "阳性能量，但男性特质不如权杖强烈", "分析、决断、批判、沟通、尖锐、伤害、言语", "风是只能感知、看不见摸不着的能量，对应到塔罗中是一种飘忽不定的能量。", "宝剑代表思维、想法、精神、信息、观念，以及有效与无效的沟通。", "但宝剑是利器，带有伤害他人的能量；面对人际关系时防御性较强。", "星币（Pentacles）", "物质、安全、稳定", "金钱、产业、现实、积累、看得见摸得着", "土是所有元素中最稳定、也最慢的。", "除金钱外，还代表看得见摸得着的东西：工资、工作、不动产；在人际中也代表对方的长相、身材等外显的具体特征。", "它更代表由积累而生的东西", "像存钱罐，缓慢增长的投入与成果：存款、学习与感情的基础。它不一定代表缺钱。"]}, {"title": "通过元素去观察大概疾病和时间的走向", "access": "老师自用 / 一对一讲解", "items": ["1.火元素：快速上升的，爆发的，发热，消退有可能快的（看周围牌），快速恶化的。快速的时间，四元素中最快的时间能量，根据牌性确定快的程度。", "2.风元素：利器割破，精神上的疾病，器官类做手术的病，尖锐疼痛，动刀可以治，血管呼吸道疾病。风元素时间也非常快，比火稍慢一些，总体快，看牌性。", "3.水元素：情绪上，心理上的病，拖拖拉拉的病，死不了但是治不好，容易反复或者复发的，吃喝问题导致的病，情绪情感消耗类的（心累）。水元素时间偏慢一点，牌性不好的需要半年以上。", "土元素：会扩散的病，血液病，肿瘤扩散或者粘连其他组织，癌症癌细胞，微量维生素等。土元素是四元素中能量最慢的牌，时间方面基本上没有低于一个月的，根据具体的牌性来判断大概的区间。"]}]}];
    const list = document.querySelector("#list");
    const search = document.querySelector("#search");
    const access = document.querySelector("#access");
    function escapeText(value) {
      return String(value).replace(/[&<>"']/g, char => ({"&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"}[char]));
    }
    function render() {
      const q = search.value.trim().toLowerCase();
      const a = access.value;
      const filteredGroups = groups.map(group => {
        const sections = group.sections.filter(section => {
          const blob = JSON.stringify(section).toLowerCase();
          return (!q || blob.includes(q)) && (!a || section.access.includes(a));
        });
        return {...group, sections};
      }).filter(group => group.sections.length);
      list.innerHTML = "";
      if (!filteredGroups.length) {
        list.innerHTML = '<div class="empty">没有搜到内容，可以换个关键词试试。</div>';
        return;
      }
      filteredGroups.forEach(group => {
        const category = document.createElement("details");
        category.className = "category";
        category.open = true;
        const totalItems = group.sections.reduce((sum, section) => sum + section.items.length, 0);
        category.innerHTML = `
          <summary>${escapeText(group.title)} · ${group.sections.length} 个专题 · ${totalItems} 条</summary>
          <div class="body topic-list">
            ${group.sections.map(section => `
              <details class="topic">
                <summary>${escapeText(section.title)} · ${section.items.length} 条</summary>
                <div class="body">
                  <span class="tag">${escapeText(section.access)}</span>
                  <ul>${section.items.map(item => `<li>${escapeText(item)}</li>`).join("")}</ul>
                </div>
              </details>
            `).join("")}
          </div>
        `;
        list.appendChild(category);
      });
    }
    search.addEventListener("input", render);
    access.addEventListener("change", render);
    render();
  </script>

  <script src="./assets/access-gate.js" data-access="group"></script>
</body>
</html>
