roup": "大牌0-5"}, {"number": "5", "name": "教皇", "raw_title": "教皇土元素金牛座", "access": "一对一 / 团课", "source": "大牌0-5.docx", "sections": {"基础信息": ["土元素金牛座"], "暧昧": ["有隐瞒信息，如果和其他的比较强势的女性牌以及家庭牌一起出现的话，有可能这个人是有稳定的伴侣，甚至家庭的。", "关系可能受已有规则或身份限制", "相亲 通过介绍认识（家人 / 朋友 / 单位）", "关系偏“正规渠道”", "讲条件、背景、匹配度", "没有感情，可能会出现双方家庭有差异的情况。", "更像“流程推进”", "受外界规则影响大"], "恋爱": ["有三方，但是不一定完全是小三。会对应到家里不同意，或者传统风俗之类的。", "如果是同性恋的话，一般来说对应着长辈以及一些世俗眼光", "关系建立在责任或制度上，而非情感", "稳定关系", "重视承诺", "符合社会/家庭期待", "高攀。如果是婚姻当中的话，也会对到联姻，不太会离婚。", "情感不足", "被规则绑住", "为了“应该”而在一起", "沟通有问题，男性站在上位", "感情里面一般来说是代表着阻碍"], "复合": ["这个一般是不能复合了"], "桃花财运": ["有桃花，很有可能是长辈或者一些领导之类的介绍撮合。", "但是这个牌如果是问桃花的话，很有可能是需要确认背景与真实情况", "工作方面财运还不错，还是比较有钱的。", "投资方面呢，还差一点。更适合稳健型，而非高风险投资", "如果是项目类的投资的话，这事儿赚不了钱。如果是投资理财金融，那这个还能赚，但是没有特别多。"], "学业": ["要学习的标志，学业方面发展的只能说一般还不够。", "也会对应到一些有老师或者说有人带着去学的这种情况。正规教育", "跟随体系学习", "如果说是需要找一些机构，甚至学校之类的，教皇可以对应到疏通关系。", "死板", "依赖权威", "缺乏独立思考", "考试的更依赖体系，发挥取决于是否适配规则"], "工作": ["工作发展也是会对应到一些要学习要去考证证书之类的情况。", "体制内 / 教育 / 机构", "咨询 / 培训 / 传承类", "有明确晋升路径", "可以对应到领导，比较大一点的领导，因为这个牌他代表的是规则和制度。", "但如果是问能不能升职的话，他代表的是权利转变，是可以升职的。按规则晋升，而不是突破式上升", "找工作也能找到，但得要学", "受限", "创新不足", "官僚化", "工作发展还可以，只能说有上升空间"], "其他": ["有玄学能量，如果和恋人一起出的话，有家族缘分。", "建议。求助，非盈利性的玄学方向。要有计划，并且朝着计划前进。找人疏通关系。注意沟通问题。"]}, "summary": "有隐瞒信息，如果和其他的比较强势的女性牌以及家庭牌一起出现的话，有可能这个人是有稳定的伴侣，甚至家庭的。；关系可能受已有规则或身份限制；相亲 通过介绍认识（家人 / 朋友 / 单位）", "tags": ["大阿尔卡那", "大牌", "教皇", "大牌0-5", "暧昧", "恋爱", "复合", "桃花财运", "学业", "工作", "其他"], "meta": {"topic": "大牌牌意", "access_note": "一对一，团课学生"}, "code": "M05", "deck": "大阿尔卡那", "suit": "大牌", "group": "大牌0-5"}, {"number": "6", "name": "恋人", "raw_title": "恋人风元素双子座", "access": "一对一 / 团课", "source": "大牌0-5.docx", "sections": {"基础信息": ["风元素双子座"], "暧昧": ["暧昧发展非常好，两个人沟通很顺畅。", "一个感情初期的萌芽状态", "双方属于一个情感驱动较强，理性判断弱化的这种情况。目前来看的话，他只能代表短期。", "能不能进到恋爱，一般是可以的。除非男生那边不愿意受到束缚的牌非常重。", "问对方对我的想法的时候，也是突出猎人的这种暧昧和沟通。", "如果在定点提问的时候，会对应到男生有三方关系。"], "恋爱": ["也是一个交流顺畅的状态。感情很好，一般来说呢，恋爱初期会比较多。", "如果说两个人谈恋爱很久了，首先要排除第三方，如果没有的话，那是一个非常和谐的状态。", "整体发展很好。", "情绪化", "不够稳定", "容易被欲望或选择干扰", "有非计划内怀孕的信息", "能不能结婚的话这个牌不能。因为通常状态，他只代表一个短期的良好的关系，没有一个非常长远和长期的考虑。但如果说两个人已经在商谈结婚详细事宜，并且有比较强烈的能够落地的能量，这个时候就是突出猎人的和谐沟通的属性了。", "吵完架问男生怎么想的，轻松的状态。"], "桃花财运": ["桃花是肯定会有的，甚至是比较享受的桃花。如果问这个桃花是什么样的人，首先考虑星座信息，然后考虑恋人之中，这种沟通氛围提供情绪价值。", "工作方面的财运不太行，控制不住花钱，所以没办法存下什么钱。", "投资的话可以合作，合作能赚钱，自己不行。", "情绪性支出", "金融理财方面也是，需要找另一个专家一起才能赚到一点，但是总体不多。"], "学业": ["学习整体发展，他是有一个不认真的状态。猎人的主题是选择，而不是稳定，所以他意味着学习当中容易被分心，投入不足。甚至是恋爱和娱乐过重，想要舒适而耽误学习。", "学习自控力不够，所以发展不太好。回答问题也不认真。", "理解能力不错", "适合互动型学习 对感兴趣的内容投入高", "考试不理想。发挥取决于专注程度和选择优先级"], "工作": ["不认真，心思没有放在工作上。", "创业的话，两个人可以，一个人干是干不起来的", "沟通能力强", "团队协作好", "客户关系好。", "但是学习如果合作的话会和工作有差别。", "工作不同于学习，它常常需要沟通、互动、配合、团队精神。", "恋人牌此时象征的就是：人际协调能力强、懂得配合、情绪共鸣力强、知道怎么和人合作共赢。恋人牌的能量是互动型的、感官驱动的、外部刺激导向的，跟学习这种“内收、深耕、稳扎稳打”的节奏不太契合", "优柔寡断", "容易被情绪影响决策", "不够稳定更偏人际驱动", "工作比较消极，升职加薪是不行的。"], "其他": ["建议的就是谨慎决定，需要长远考虑。做决定之前要动脑子。双人合作，另外一个就是谈恋爱。"]}, "summary": "暧昧发展非常好，两个人沟通很顺畅。；一个感情初期的萌芽状态；双方属于一个情感驱动较强，理性判断弱化的这种情况。目前来看的话，他只能代表短期。", "tags": ["大阿尔卡那", "大牌", "恋人", "大牌6-10", "暧昧", "恋爱", "桃花财运", "学业", "工作", "其他"], "meta": {"topic": "大牌牌意", "access_note": "一对一，团课学生"}, "code": "M06", "deck": "大阿尔卡那", "suit": "大牌", "group": "大牌6-10"}, {"number": "7", "name": "战车", "raw_title": "战车水元素巨蟹", "access": "一对一 / 团课", "source": "大牌0-5.docx", "sections": {"基础信息": ["水元素巨蟹"], "暧昧": ["感情发展的话，其实是会比较快速推进的。 主动明确目标", "有行动力", "只顾推进，不顾感受", "控制欲强", "节奏过快导致失衡", "不太会谈恋爱，也没有太多结婚信息。这些是在计划外的，需要自由。", "战车是大阿尔卡那第七号，对应巨蟹座（情感强、护壳强，但也超怕被掌控）；", "他内心渴望“我主导、我出发、我决定”，", "所以当生活中有太多外界推着你走的东西（比如家庭、社会标准、人设期待），他就会越来越不想推进，反而想挣脱", "是一个会主动挑选对象的人，感情状况出这个说明对方追求的人特别多。", "三方。和恋人的不一样。是有选择性的。"], "恋爱": ["恋爱当中也是意味着进程比较快。", "有目标（见家长/未来规划）行动力强", "如果说女方是比较强势，或者情绪需求比较大，甚至是吵架了，这个时候去问男生的感受的时候一般意味着被压制，被掌控。", "控制关系", "忽略情绪", "压迫感", "第三方。", "虽然说这里意味着整体的进程比较快，但是问能不能结婚的时候是不行的。是一个需要自由的状态。特别是在某一方试图去推进结婚，或者是家人推进，都会激发战车的这种想要逃离掌控的特质", "不接受别人定义节奏，但会自己推进。"], "复合": ["有可能复合，但需要行动和推进"], "桃花财运": ["桃花是有的。但是要看具体情况，一般来说呢，有可能会同时聊两个花或者同时接触两个人。但如果说女方特别弱势，或者在看到对方是个什么样的人的时候，男生是特别强势的性格，女生有可能是被掌控的那个。", "工作方面的财运不错，但是花得也很快。属于提升生活品质的那种开销，享受。", "投资类型的呢，车牌他这种快速的能量，不是一个非常适合投资的时机或者项目可能变动性比较大。或者是压力大。", "收入增长快", "有行动带来的收益"], "学业": ["一般来说，学习这块意味着压力大。节奏失控", "目标明确", "执行力强", "冲刺型选手", "但是整体发展是挺好的。", "他这种压力，有可能是来自于第三方的施压。比如说老师和家庭。", "冲劲很足，对于自己学习的目标，很有想法。", "考试是可以的。"], "工作": ["发展好推进能力强", "适合项目执行", "适合冲业绩", "能找到工作", "升职加薪也是可以的", "如果问辞职和跳槽是不是好机会的话，现在就是个好机会", "但是压力是存在的，特别是在问我刚接到的Offer，我去工作的话发展怎么样？ 这种情况下经常会出现高压", "容易过劳"], "其他": ["适合推进重大决策或行动", "建议就是赶紧做我手上的事情，不要浪费时间", "高强度的学习和工作", "把注意力放在工作上。"]}, "summary": "感情发展的话，其实是会比较快速推进的。 主动明确目标；有行动力；只顾推进，不顾感受", "tags": ["大阿尔卡那", "大牌", "战车", "大牌6-10", "暧昧", "恋爱", "复合", "桃花财运", "学业", "工作", "其他"], "meta": {"topic": "大牌牌意", "access_note": "一对一，团课学生"}, "code": "M07", "deck": "大阿尔卡那", "suit": "大牌", "group": "大牌6-10"}, {"number": "8", "name": "力量", "raw_title": "力量火元素狮子座", "access": "一对一 / 团课", "source": "大牌0-5.docx", "sections": {"基础信息": ["火元素狮子座"], "暧昧": ["性能量强，", "欲望存在，但被管理", "互动自然", "情绪稳定", "女方主动而且占据主导", "如果男方那边情绪很低落，有可能是女方太过于主动热情，让男生感到压迫感。", "人之间的力量是失衡的，所以暧昧状态当中力量一般来说不会特别的平等。", "能不能进到恋爱关系？这个一般是不太能的。"], "恋爱": ["包容", "情绪稳定", "能处理冲突", "压抑", "忍耐过度", "表面平静，内在消耗", "因为女性能量很强，再加上能量失衡，最常见的就是对应到女生的控制欲。"], "复合": ["说实话比较难，"], "桃花财运": ["因为性能量比较强，所以桃花是有的，但是有可能是先从性方面开始。", "如果问这个桃花是什么样的人的话，对应星座信息。另外就是力量是能够做到明显健身痕迹的。", "没有太多钱，工作方面属于紧巴巴的自己花。投资呢是不可能的，一定赔本。"], "学业": ["不认真的状态", "压力大", "用意志硬撑", "效率不高", "有耐心", "能坚持", "后劲强", "这里虽然说有以柔克刚这么个情况，但是他是凭藉自己的力量来把这个狮子的嘴张开，他用的是力气，而不是脑子。", "所以学习发展是不行的，目前来说是没有问题，但是他只是在用力量来压制自己的问题。", "考试不行，会有粗心的情况。或者是之前掩盖住的问题出现了的情况。"], "工作": ["也是不认真。", "抗压能力强", "稳定执行", "能处理复杂关系", "会有刚入职的情况，但是有点毛手毛脚的。", "内耗", "压力过载", "不敢表达", "冲动，做事情考虑不全面。", "工作里面的这种危险是存在的，可能会有做出失误，让别人擦屁股的情况。或者是承担不了太重的工作，但是硬要承担的情况", "升职加薪肯定是不行的。", "辞职跳槽的话，辞职要考虑力量它的经济情况。跳槽的话是可以，但是要注意交接问题。"], "其他": ["建议第一个就是考虑关系是否健康", "不要承担太重的工作", "多想多动脑子", "根据不同的情况来给不同的建议。要么是处理问题的时候稍微强势一点，要么是放弃对某件事情的控制。", "运动"]}, "summary": "性能量强，；欲望存在，但被管理；互动自然", "tags": ["大阿尔卡那", "大牌", "力量", "大牌6-10", "暧昧", "恋爱", "复合", "桃花财运", "学业", "工作", "其他"], "meta": {"topic": "大牌牌意", "access_note": "一对一，团课学生"}, "code": "M08", "deck": "大阿尔卡那", "suit": "大牌", "group": "大牌6-10"}, {"number": "9", "name": "隐士", "raw_title": "隐士土元素处女座", "access": "一对一 / 团课", "source": "大牌0-5.docx", "sections": {"基础信息": ["土元素处女座"], "暧昧": ["如果在暧昧当中出了这个牌的话，不是很建议继续了。对方逃避的心态很重。", "节奏慢", "有距离感 单方面互动", "逃避的是什么呢？有可能是女生的情和追求有可能是逃避对恋爱的这种责任。主要看两个人之间有没有互动，没有互动的话很有可能，逃避的就是这个人对这个人不太感兴趣。", "沟通无效，基本上都是单方面的沟通", "没有什么结果，对方没有准备好谈恋爱。"], "恋爱": ["指向一些过去的问题，有可能是因为这个问题吵过架的。这个问题一直都没有解决", "逃避回避的心态", "不愿意去，直面问题，也不愿意沟通", "需要自己个人的空间不太被打扰", "暂停处理问题", "没有结婚信息", "整体发展的话，基本上来说是走向一个沟通方面的问题。", "回避沟通", "情绪封闭"], "复合": ["没有回旋余地 短期难复合，"], "桃花财运": ["没有桃花，不需要桃花 不主动 + 不社交", "工作方面没什么钱，投资也不行", "稳", "慢", "可积累"], "学业": ["学习方面的，他是一个认真探索的这种能量。有求知心态", "学习发展是好的，但是需要很长时间。", "可能有被霸凌的经历", "做学术和项目的时候很好", "适合专业深入，到学术搞研究，非常擅长。", "但是社交方面不太好，我也没什么朋友", "考试的话，这个是不行的。他代表的是一个需要认真去研究去沉淀才能有结果的牌，所以在这里问考试能不能给我出，那就是还得学，还得继续研究。 不适合短期应试，更适合长期积累"], "工作": ["找不到工作 专业型岗位，而非社交型岗位", "如果是独立完成的工作的话，那还可以。但是大环境基本上都是团队完成的，所以工作的整体发展不是特别乐观", "整体发展发展慢，但方向稳定，包括工作里面的人际沟通关系也不好", "没被失业或者开除的风险，但是有可能会被边缘化", "加薪肯定是不行的。如果说不要不要辞职，跳槽的话，那就要先确定他的这个方向是什么，如果说是行业专业专经，那暂时不建议跳槽和辞职。让他再熬一熬吧"], "其他": ["这个是有刚离婚的能量的。", "建议除了等就是分手，另外就是少说话，祸从口出。因为最笨，不太会说话，另外一个就是这本身是跟沉淀的牌，你需要更多的时间和空间，你才能想清楚问题"]}, "summary": "如果在暧昧当中出了这个牌的话，不是很建议继续了。对方逃避的心态很重。；节奏慢；有距离感 单方面互动", "tags": ["大阿尔卡那", "大牌", "隐士", "大牌6-10", "暧昧", "恋爱", "复合", "桃花财运", "学业", "工作", "其他"], "meta": {"topic": "大牌牌意", "access_note": "一对一，团课学生"}, "code": "M09", "deck": "大阿尔卡那", "suit": "大牌", "group": "大牌6-10"}, {"number": "10", "name": "命运之轮", "raw_title": "命运之轮", "access": "一对一 / 团课", "source": "大牌0-5.docx", "sections": {"核心提示": ["一共只需要记住三点：", "命运之轮是状态，不适合让你单张解读，分为三种", "1.正在进行时", "2.过渡期间，从A状态到B状态", "3.未完成时，还会持续", "建议是维持现状，不要做改变", "考试的话看位置。"]}, "summary": "待补充课堂摘要。", "tags": ["大阿尔卡那", "大牌", "命运之轮", "大牌6-10"], "meta": {"topic": "大牌牌意", "access_note": "一对一，团课学生"}, "code": "M10", "deck": "大阿尔卡那", "suit": "大牌", "group": "大牌6-10"}, {"number": "11", "name": "正义", "raw_title": "正义风元素天秤座", "access": "一对一 / 团课", "source": "大牌0-5.docx", "sections": {"基础信息": ["风元素天秤座"], "暧昧": ["一定要要注意剑和天秤的位置。 情感和理性在做权衡，未必已经倾斜", "如果他第一位的话，说明暂时安全。和保健在一起是有争执和冲突。", "暧昧关系是有不确定性的。不会轻易投入", "他不是纯粹的喜欢         return;
      }
      const decks = new Map();
      filtered.forEach(card => {
        if (!decks.has(card.deck)) decks.set(card.deck, new Map());
        const suits = decks.get(card.deck);
        if (!suits.has(card.suit)) suits.set(card.suit, new Map());
        const groups = suits.get(card.suit);
        if (!groups.has(card.group)) groups.set(card.group, []);
        groups.get(card.group).push(card);
      });
      sortByOrder(decks.keys(), deckOrder).forEach(deck => {
        const deckDetails = document.createElement("details");
        deckDetails.className = "deck";
        deckDetails.open = !!q || deck === "大阿尔卡那";
        const suits = decks.get(deck);
        const deckCount = [...suits.values()].reduce((sum, groups) => sum + [...groups.values()].reduce((x, cards) => x + cards.length, 0), 0);
        deckDetails.innerHTML = `<summary>${deck} · ${deckCount} 张</summary>`;
        const deckBody = document.createElement("div");
        deckBody.className = "body";
        sortByOrder(suits.keys(), suitOrder).forEach(suit => {
          const suitDetails = document.createElement("details");
          suitDetails.className = "suit";
          suitDetails.open = !!q || deck === "大阿尔卡那";
          const groups = suits.get(suit);
          const suitCount = [...groups.values()].reduce((sum, cards) => sum + cards.length, 0);
          suitDetails.innerHTML = `<summary>${suit} · ${suitCount} 张</summary>`;
          const suitBody = document.createElement("div");
          suitBody.className = "body";
          sortByOrder(groups.keys(), groupOrder).forEach(group => {
            const groupDetails = document.createElement("details");
            groupDetails.open = !!q;
            groupDetails.innerHTML = `<summary>${group} · ${groups.get(group).length} 张</summary>`;
            const cardsWrap = document.createElement("div");
            cardsWrap.className = "body cards";
            cardsWrap.innerHTML = groups.get(group).map(card => cardHtml(card, selectedSection)).join("");
            groupDetails.appendChild(cardsWrap);
            suitBody.appendChild(groupDetails);
          });
          suitDetails.appendChild(suitBody);
          deckBody.appendChild(suitDetails);
        });
        deckDetails.appendChild(deckBody);
        list.appendChild(deckDetails);
      });
    }
    search.addEventListener("input", render);
    section.addEventListener("change", render);
    const params = new URLSearchParams(location.search);
    if (params.get("query")) search.value = params.get("query");
    if (params.get("section")) section.value = params.get("section");
    render();
  </script>

  <script src="./assets/access-gate.js" data-access="group"></script>
</body>
</html>
